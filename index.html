<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>버즈빌 RMN 제휴 통합 계약서 생성기</title>
<style>
  :root {
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-muted: #888;
    --line: #e5e5e5;
    --line-soft: #f0f0f0;
    --bg: #fafaf7;
    --panel: #ffffff;
    --accent: #1357F5;
    --accent-soft: #e8efff;
    --highlight: #fff4a3;
    --highlight-strong: #ffea70;
    --danger: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: "맑은 고딕", "Malgun Gothic", -apple-system, sans-serif;
    color: var(--ink);
    background: var(--bg);
    font-size: 14px;
    line-height: 1.55;
  }
  body { display: flex; flex-direction: column; overflow: hidden; }

  header {
    padding: 14px 22px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  header .subtitle {
    font-size: 12px;
    color: var(--ink-muted);
    margin-top: 2px;
  }
  header .actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    padding: 9px 16px;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: white;
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }
  .btn:hover { background: #000; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn.ghost {
    background: transparent;
    color: var(--ink);
  }
  .btn.ghost:hover { background: var(--line-soft); }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 360px 1fr;
    min-height: 0;
  }

  /* Left panel */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 18px 18px 40px;
  }
  .section {
    padding: 14px 0 16px;
    border-bottom: 1px dashed var(--line);
  }
  .section:last-child { border-bottom: none; }
  .section > h3 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 10px;
  }
  .field { margin-bottom: 10px; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .field input[type="text"],
  .field input[type="date"],
  .field input[type="number"] {
    width: 100%;
    padding: 7px 9px;
    border: 1px solid var(--line);
    border-radius: 5px;
    font-family: inherit;
    font-size: 13px;
    background: white;
    color: var(--ink);
  }
  .field input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .checkbox-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all .15s;
    background: white;
  }
  .checkbox-row:hover { border-color: var(--ink-muted); }
  .checkbox-row.checked {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .checkbox-row input { margin-top: 2px; cursor: pointer; accent-color: var(--accent); }
  .checkbox-row .cb-label { font-weight: 600; font-size: 13px; }
  .checkbox-row .cb-desc { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }

  .case-sub {
    margin-top: 8px;
    padding-left: 12px;
    border-left: 2px solid var(--line);
  }
  .case-sub .case-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-size: 12px;
  }

  .row-inline {
    display: grid;
    grid-template-columns: 1fr 80px;
    gap: 8px;
    align-items: center;
    margin-bottom: 7px;
  }
  .row-inline label {
    font-size: 12px;
    color: var(--ink-soft);
  }
  .row-inline input {
    padding: 5px 8px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 12px;
    font-family: inherit;
    text-align: right;
    background: white;
  }
  .row-inline input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .module-group {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }
  .module-group.disabled { opacity: .4; pointer-events: none; }
  .module-group h4 {
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--ink);
  }

  /* Preview */
  .preview-wrap {
    overflow-y: auto;
    padding: 30px 50px 80px;
  }
  .page {
    max-width: 780px;
    margin: 0 auto;
    background: white;
    padding: 60px 70px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    border-radius: 2px;
    font-size: 12.5px;
    line-height: 1.75;
    color: #222;
  }
  .page h1.title {
    text-align: center;
    font-size: 20px;
    margin-bottom: 24px;
    letter-spacing: -0.02em;
  }
  .page h2.article {
    font-size: 14px;
    font-weight: 700;
    margin-top: 20px;
    margin-bottom: 8px;
  }
  .page .module-tag {
    color: var(--danger);
    font-size: 12px;
    font-weight: 700;
    margin-right: 4px;
  }
  .page h3.subhead {
    font-size: 12.5px;
    font-weight: 700;
    margin-top: 12px;
    margin-bottom: 6px;
  }
  .page p { margin: 4px 0; }
  .page p.indent1 { padding-left: 20px; }
  .page p.indent2 { padding-left: 40px; }
  .page table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0;
    font-size: 11.5px;
  }
  .page th, .page td {
    border: 1px solid #999;
    padding: 6px 8px;
    text-align: center;
    vertical-align: middle;
  }
  .page th { background: #d9d9d9; font-weight: 700; }
  .page td.left { text-align: left; }
  .page .hl { background: var(--highlight); padding: 1px 2px; }
  .page tr.hl td, .page td.hl { background: #fff2cc; }
  .page .sig-table {
    table-layout: fixed;
    width: 100%;
  }
  .page .sig-table td {
    width: 50%;
    text-align: left;
    vertical-align: top;
    padding: 14px 18px;
    line-height: 1.9;
  }
  .page .date-line {
    text-align: center;
    margin: 24px 0 14px;
    font-weight: 700;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-muted);
    font-size: 13px;
  }

  /* Loading overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    font-size: 14px;
    font-weight: 600;
  }
  .overlay.active { display: flex; }
</style>
</head>
<body>

<header>
  <div>
    <h1>버즈빌 RMN 제휴 통합 계약서 생성기</h1>
    <div class="subtitle">모듈 선택 + 요율 입력 → Word 파일 다운로드</div>
  </div>
  <div class="actions">
    <button class="btn ghost" id="resetBtn">초기화</button>
    <button class="btn" id="downloadBtn">Word 다운로드</button>
  </div>
</header>

<main>
  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="section">
      <h3>기본 정보</h3>
      <div class="field">
        <label>고객사명</label>
        <input type="text" id="clientName" placeholder="예: 주식회사 무신사" value="주식회사 OOO">
      </div>
      <div class="field">
        <label>계약 시작일</label>
        <input type="date" id="startDate">
      </div>
      <div class="field">
        <label>계약 종료일</label>
        <input type="date" id="endDate">
      </div>
    </div>

    <div class="section">
      <h3>적용 모듈 선택</h3>
      <label class="checkbox-row" data-module="m1">
        <input type="checkbox" id="cb-m1" checked>
        <div>
          <div class="cb-label">모듈 1. 버즈베네핏 (오퍼월)</div>
          <div class="cb-desc">버즈빌이 수주한 광고를 매체사 지면에 노출</div>
        </div>
      </label>

      <label class="checkbox-row" data-module="m2">
        <input type="checkbox" id="cb-m2">
        <div>
          <div class="cb-label">모듈 2. 입점사 광고 (RMP)</div>
          <div class="cb-desc">매체 입점사 광고 → 매체사 지면 (on-site)</div>
        </div>
      </label>

      <label class="checkbox-row" data-module="m3">
        <input type="checkbox" id="cb-m3">
        <div>
          <div class="cb-label">모듈 3. 협력광고</div>
          <div class="cb-desc">매체 입점사 광고 → 버즈빌 제휴 매체 지면 (off-site)</div>
        </div>
      </label>

      <label class="checkbox-row" data-module="m4">
        <input type="checkbox" id="cb-m4">
        <div>
          <div class="cb-label">모듈 4. 버즈부스터</div>
          <div class="cb-desc">마케팅 캠페인 솔루션 (출석체크·스탬프 등)</div>
        </div>
      </label>
    </div>

    <!-- 모듈 1 세부 -->
    <div class="section module-group" id="opts-m1">
      <h4>모듈 1 세부 설정 (버즈베네핏)</h4>
      <div class="row-inline">
        <label>노출형 R/S (고객사:버즈빌)</label>
        <input type="text" id="rs-impression" value="6:4">
      </div>
      <div class="row-inline">
        <label>액션형 R/S</label>
        <input type="text" id="rs-action" value="7:3">
      </div>
      <div class="row-inline">
        <label>ADN R/S</label>
        <input type="text" id="rs-adn" value="7:3">
      </div>
      <div class="row-inline">
        <label>콘텐츠 광고 정산배수</label>
        <input type="text" id="mult-content" value="1~1.7" placeholder="예: 1~1.7">
      </div>
      <div class="row-inline">
        <label>멀티미션 정산배수</label>
        <input type="text" id="mult-multi" value="1.2" placeholder="예: 1.2">
      </div>
    </div>

    <!-- 모듈 2 세부 -->
    <div class="section module-group" id="opts-m2">
      <h4>모듈 2 세부 설정 (RMP)</h4>
      <div class="field">
        <label>영업 케이스</label>
        <div class="case-sub">
          <label class="case-item"><input type="radio" name="rmp-case" value="A" checked> 케이스 A (매체사 직영업)</label>
          <label class="case-item"><input type="radio" name="rmp-case" value="B"> 케이스 B (버즈빌 영업 지원)</label>
          <label class="case-item"><input type="radio" name="rmp-case" value="BOTH"> 둘 다 명시</label>
        </div>
      </div>
      <div class="row-inline">
        <label>케이스 A 수수료율 (%)</label>
        <input type="number" id="rate-rmp-a" placeholder="예: 15" min="0" max="100" step="0.1">
      </div>
      <div class="row-inline">
        <label>케이스 B 수수료율 (%)</label>
        <input type="number" id="rate-rmp-b" placeholder="예: 25" min="0" max="100" step="0.1">
      </div>
      <div class="row-inline">
        <label>고객사 자체광고 포함</label>
        <input type="checkbox" id="cb-self-ad" style="justify-self: end; width: 16px; height: 16px;">
      </div>
      <div style="font-size: 11px; color: var(--ink-muted); padding: 4px 2px; line-height: 1.4;">※ 고객사 자체광고는 수수료 없음 (포함 시 시스템 등록용)</div>
    </div>

    <!-- 모듈 3 세부 -->
    <div class="section module-group" id="opts-m3">
      <h4>모듈 3 세부 설정 (협력광고)</h4>
      <div class="field">
        <label>정산 방향</label>
        <div class="case-sub">
          <label class="case-item"><input type="radio" name="coop-dir" value="CtoB" checked> 고객사 → 버즈빌 수수료 지급</label>
          <label class="case-item"><input type="radio" name="coop-dir" value="BtoC"> 버즈빌 → 고객사 수수료 지급</label>
          <label class="case-item"><input type="radio" name="coop-dir" value="NONE"> 수수료 없음</label>
        </div>
      </div>
      <div class="row-inline">
        <label>수수료율 (%)</label>
        <input type="number" id="rate-coop" placeholder="공란 시 미기재" min="0" max="100" step="0.1">
      </div>
    </div>

    <!-- 모듈 4 세부 -->
    <div class="section module-group" id="opts-m4">
      <h4>모듈 4 세부 설정 (버즈부스터)</h4>
      <div class="row-inline">
        <label>월 기본 요금 (원)</label>
        <input type="number" id="booster-fee" value="100000" placeholder="예: 100000">
      </div>
      <div class="row-inline">
        <label>월 기본 제공 건수</label>
        <input type="number" id="booster-quota" value="25000" placeholder="예: 25000">
      </div>
      <div class="row-inline">
        <label>Basic 플랜(무상) 적용</label>
        <input type="checkbox" id="cb-booster-basic" style="justify-self: end; width: 16px; height: 16px;">
      </div>
    </div>

  </aside>

  <!-- Preview -->
  <div class="preview-wrap">
    <div class="page" id="preview"></div>
  </div>
</main>

<div class="overlay" id="overlay">Word 파일 생성 중…</div>

<!-- docx library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.cjs"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>
// ============================================================
// STATE & INIT
// ============================================================
const state = {
  clientName: '주식회사 OOO',
  startDate: '',
  endDate: '',
  modules: { m1: true, m2: false, m3: false, m4: false },
  rs: { impression: '6:4', action: '7:3', adn: '7:3' },
  mult: { content: '1~1.7', multi: '1.2' },
  rmp: { case: 'A', rateA: '', rateB: '', selfAd: false },
  coop: { direction: 'CtoB', rate: '' },
  booster: { fee: '100000', quota: '25000', basic: false },
};

// Set default dates
(function initDates() {
  const now = new Date();
  const yr = now.getFullYear();
  state.startDate = `${yr}-01-01`;
  state.endDate = `${yr + 1}-12-31`;
  document.getElementById('startDate').value = state.startDate;
  document.getElementById('endDate').value = state.endDate;
})();

// ============================================================
// BIND EVENTS
// ============================================================
function bindInputs() {
  document.getElementById('clientName').addEventListener('input', e => {
    state.clientName = e.target.value || '주식회사 OOO';
    render();
  });
  document.getElementById('startDate').addEventListener('change', e => {
    state.startDate = e.target.value; render();
  });
  document.getElementById('endDate').addEventListener('change', e => {
    state.endDate = e.target.value; render();
  });

  ['m1','m2','m3','m4'].forEach(m => {
    document.getElementById('cb-' + m).addEventListener('change', e => {
      state.modules[m] = e.target.checked;
      document.querySelector(`.checkbox-row[data-module="${m}"]`).classList.toggle('checked', e.target.checked);
      document.getElementById('opts-' + m).classList.toggle('disabled', !e.target.checked);
      render();
    });
    // initial state
    const checked = document.getElementById('cb-' + m).checked;
    document.querySelector(`.checkbox-row[data-module="${m}"]`).classList.toggle('checked', checked);
    document.getElementById('opts-' + m).classList.toggle('disabled', !checked);
  });

  // Module 1
  document.getElementById('rs-impression').addEventListener('input', e => { state.rs.impression = e.target.value; render(); });
  document.getElementById('rs-action').addEventListener('input', e => { state.rs.action = e.target.value; render(); });
  document.getElementById('rs-adn').addEventListener('input', e => { state.rs.adn = e.target.value; render(); });
  document.getElementById('mult-content').addEventListener('input', e => { state.mult.content = e.target.value; render(); });
  document.getElementById('mult-multi').addEventListener('input', e => { state.mult.multi = e.target.value; render(); });

  // Module 2
  document.querySelectorAll('input[name="rmp-case"]').forEach(r => r.addEventListener('change', e => {
    state.rmp.case = e.target.value; render();
  }));
  document.getElementById('rate-rmp-a').addEventListener('input', e => { state.rmp.rateA = e.target.value; render(); });
  document.getElementById('rate-rmp-b').addEventListener('input', e => { state.rmp.rateB = e.target.value; render(); });
  document.getElementById('cb-self-ad').addEventListener('change', e => { state.rmp.selfAd = e.target.checked; render(); });

  // Module 3
  document.querySelectorAll('input[name="coop-dir"]').forEach(r => r.addEventListener('change', e => {
    state.coop.direction = e.target.value; render();
  }));
  document.getElementById('rate-coop').addEventListener('input', e => { state.coop.rate = e.target.value; render(); });

  // Module 4
  document.getElementById('booster-fee').addEventListener('input', e => { state.booster.fee = e.target.value; render(); });
  document.getElementById('booster-quota').addEventListener('input', e => { state.booster.quota = e.target.value; render(); });
  document.getElementById('cb-booster-basic').addEventListener('change', e => { state.booster.basic = e.target.checked; render(); });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('모든 입력을 초기화합니다.')) location.reload();
  });
  document.getElementById('downloadBtn').addEventListener('click', downloadWord);
}

// ============================================================
// HELPERS
// ============================================================
function fmtDate(dateStr) {
  if (!dateStr) return 'OOOO년 OO월 OO일';
  const [y,m,d] = dateStr.split('-');
  return `${y}년 ${m}월 ${d}일`;
}
function blankOrVal(v, unit='%') {
  if (v === '' || v === null || v === undefined) return { text: '___' + unit, highlight: true };
  return { text: v + unit, highlight: false };
}
function pct(v) { return blankOrVal(v, '%'); }

// Active modules list (ordered)
function activeModules() {
  const ms = [];
  if (state.modules.m1) ms.push('m1');
  if (state.modules.m2) ms.push('m2');
  if (state.modules.m3) ms.push('m3');
  if (state.modules.m4) ms.push('m4');
  return ms;
}

// ============================================================
// PREVIEW (HTML) — dynamically numbered based on active modules
// ============================================================
function render() {
  const p = document.getElementById('preview');
  const modules = activeModules();

  if (modules.length === 0) {
    p.innerHTML = '<div class="empty-state">왼쪽에서 최소 1개 이상의 모듈을 선택하세요.</div>';
    return;
  }

  // Article numbering: 1=목적, 2=용어정의, 3=적용서비스, 4+=모듈들, 이후=공통조항
  let articleNum = 4;
  const moduleArticleNums = {};
  modules.forEach(m => { moduleArticleNums[m] = articleNum++; });
  const commonStart = articleNum;

  let html = '';

  // Title
  html += `<h1 class="title">버즈빌 RMN 제휴 통합 계약서</h1>`;
  html += `<p>${state.clientName} (이하 <b>"고객사"</b>)와 주식회사 버즈빌 (이하 <b>"버즈빌"</b>)은 상호 신뢰를 바탕으로 다음과 같이 계약을 체결한다.</p>`;

  // Article 1
  html += `<h2 class="article">제1조 (목적)</h2>`;
  html += `<p>본 계약은 "버즈빌"이 제공하는 버즈빌 솔루션을 "고객사"가 사용하여 이를 "유저"에게 제공함에 있어, 양 당사자간의 권리·의무 관계 및 제반 사항을 규정함을 목적으로 한다.</p>`;

  // Article 2 (용어 정의) — only include relevant terms per module
  html += `<h2 class="article">제2조 (용어의 정의)</h2>`;
  html += `<p>① 본 계약에서 사용되는 용어의 정의는 다음 각 호와 같다.</p>`;
  const terms = buildTerms();
  terms.forEach((t, i) => {
    html += `<p class="indent1">${i+1}. ${t.hl ? '<span class="hl">' + t.text + '</span>' : t.text}</p>`;
  });
  html += `<p>② 전 항에 규정된 용어의 정의는 본 계약 및 본 계약에 대한 변경 계약에 한하여 유효하며, 전 항에 규정되지 않은 용어의 해석은 관련법령 또는 상관례에 따른다.</p>`;

  // Article 3 — 적용 서비스
  html += `<h2 class="article">제3조 (본 계약 적용 서비스)</h2>`;
  html += `<p>"고객사"와 "버즈빌"은 아래 표에 명시된 서비스 모듈에 한하여 본 계약의 해당 조항을 적용한다.</p>`;
  html += `<table><thead><tr><th style="width:18%">적용</th><th>서비스 모듈</th><th style="width:20%">해당 조항</th></tr></thead><tbody>`;
  if (state.modules.m1) html += `<tr><td>☑</td><td class="left">모듈 1. 버즈베네핏 (오퍼월)</td><td>제${moduleArticleNums.m1}조</td></tr>`;
  if (state.modules.m2) html += `<tr><td>☑</td><td class="left">모듈 2. 입점사 광고 (RMP)</td><td>제${moduleArticleNums.m2}조</td></tr>`;
  if (state.modules.m3) html += `<tr><td>☑</td><td class="left">모듈 3. 협력광고</td><td>제${moduleArticleNums.m3}조</td></tr>`;
  if (state.modules.m4) html += `<tr><td>☑</td><td class="left">모듈 4. 버즈부스터</td><td>제${moduleArticleNums.m4}조</td></tr>`;
  html += `</tbody></table>`;

  // Modules
  if (state.modules.m1) html += renderM1(moduleArticleNums.m1);
  if (state.modules.m2) html += renderM2(moduleArticleNums.m2);
  if (state.modules.m3) html += renderM3(moduleArticleNums.m3);
  if (state.modules.m4) html += renderM4(moduleArticleNums.m4);

  // Common clauses (제N조~)
  html += renderCommon(commonStart);

  // Signature
  html += `<p style="margin-top:24px">양 당사자는 이상 상호 합의된 내용이 자신의 의사와 일치함을 확인하며, 계약서 2부를 작성하여 기명 날인하고 각각 1부씩 보관한다.</p>`;
  html += `<div class="date-line">${fmtDate(state.startDate)}</div>`;
  html += `<table class="sig-table"><tr>`;
  html += `<td><b>"고객사"</b><br>${state.clientName}<br>(주소)<br>대표이사 성명 (인)</td>`;
  html += `<td><b>"버즈빌"</b><br>주식회사 버즈빌<br>서울시 송파구 석촌호수로 272 MY빌딩 2~5F<br>대표이사 이관우 (인)</td>`;
  html += `</tr></table>`;

  p.innerHTML = html;
}

    t.push({ text: '"고객사 약관"이란 "고객사 서비스" 약관을 의미하며, "유저"가 "고객사 서비스"를 이용함에 있어 "유저" 및 "고객사"의 제반 권리, 의무와 관련 절차 등을 규정하고 "유저"와 "고객사"가 회원가입 계약의 내용으로 하기로 합의한 것을 말한다.' });
  }
  t.push({ text: '"광고"란 광고주가 특정 물품 또는 용역을 판매(다운로드 포함)·홍보하기 위하여 "버즈베네핏 지면" 또는 "버즈빌 광고 네트워크"에 게재, 노출하는 용역을 말한다.' });
  t.push({ text: '"대시보드"란 버즈빌 솔루션 운영에 수반되는 통계 및 매출 데이터를 제공하는 관리운영시스템을 말한다.' });
  t.push({ text: '"부정 행위"란 "고객사"의 "유저"가 "고객사"가 운영하는 지면 및 "버즈빌"의 광고상품을 남용하거나 "고객사"가 이를 묵인하는 행위를 의미하며, 구체적 유형은 업계 관행을 따르되 최종 판단 권한은 "버즈빌"이 갖는다.' });

  if (state.modules.m1) {
    t.push({ text: '"버즈베네핏"이란 "유저"에게 "광고" 등을 제공하고 "유저"가 클릭 등 특정 행위를 이행한 경우 해당 "유저"에게 약정된 포인트를 지급하는 솔루션을 말한다.' });
    t.push({ text: '"싱글미션 광고"란 광고주가 설정한 단일 목표를 달성하기 위해 "유저"가 수행해야 하는 행동이 1개로 구성된 광고 유형을 말하며, 노출형 광고, 액션형 광고, 콘텐츠 광고로 세분화된다.' });
    t.push({ text: '"멀티미션 광고"란 2개 이상의 "싱글미션 광고" 요소를 결합하여 구성한 광고로, "유저"가 수행해야 하는 행동이 복수로 설계된 복합형 광고를 말한다.' });
    t.push({ text: '"광고수익"이란 "유저"의 "광고" 참여에 따라 발생하는 매출에서 영업비용을 제외한 실질적인 광고 제공 수익 금액을 말한다.' });
    t.push({ text: '"매체비"란 "버즈베네핏" 솔루션을 통해 "버즈빌"이 얻은 "광고 수익" 중 일부를 "고객사"에게 지급하는 금액을 말한다.' });
    t.push({ text: '"애드네트워크 광고"란 버즈빌 직영업 물량 외 다수의 광고미디어를 네트워크로 묶어 광고를 수주하고 광고 물량을 제공하는 업체로부터 수급한 물량을 말한다.' });
  }

  if (state.modules.m4) {
    t.push({ text: '"버즈부스터"란 유저 인게이지먼트 강화를 위해 "버즈베네핏" 혹은 "고객사 서비스"에서 "포인트"를 활용하여 "유저"를 대상으로 이벤트(출석체크, 스탬프 등)를 운영할 수 있는 솔루션을 말한다.' });
    t.push({ text: '"버즈부스터 사용료"란 "고객사"에서 필요에 의해 "버즈부스터" 이벤트를 운영할 경우, 유저의 참여 건당 "버즈빌"에게 "고객사"가 지급해야 하는 금액을 말한다.' });
  }

  if (state.modules.m2) {
    t.push({ text: '"입점사 광고"란 "고객사"가 자사 입점 브랜드사 또는 "고객사"가 직접 수주한 제3자 광고주로부터 수주하여 "고객사" 플랫폼 내 지면에 게재하는 "광고"를 의미한다.' });
    t.push({ text: '"입점사 광고 수수료"란 "고객사"가 "입점사 광고" 운영에 대한 솔루션 이용 대가로 "버즈빌"에 지급하는 수수료를 말한다.' });
    if (state.rmp.selfAd) {
      t.push({ hl: true, text: '"고객사 자체 광고"란 "고객사"가 "입점사 광고"가 아닌 자체 마케팅 목적으로 자비 부담하여 "고객사" 플랫폼 내 지면에 게재하는 "광고"를 의미하며, "입점사 광고"와 동일한 시스템을 통해 운영된다. "고객사 자체 광고"는 실제 "광고 매출"의 정산이 진행되지 않으며, 운영 현황 관리를 위해 시스템에 등록하여 운영하되 별도의 수수료는 부과하지 아니한다.' });
    }
  }

  if (state.modules.m3) {
    t.push({ text: '"협력 광고"란 "고객사"의 1st Party Data와 카탈로그를 활용하여 입점 브랜드사의 광고를 "고객사" 플랫폼이 아닌 "버즈빌"이 운영하는 버즈빌 광고 네트워크에 송출하는 인앱 이벤트 기반의 정밀 타겟팅 광고 상품을 의미한다.' });
    t.push({ text: '"1st Party Data"란 "고객사"가 직접 수집·보유한 이용자 행동 데이터, 관심사 데이터, 구매 데이터 등 "고객사" 내에서 생성된 "고객사"의 이용자 데이터를 말한다.' });
  }
  return t;
}

async function downloadWord() {
  const modules = activeModules();
  if (modules.length === 0) {
    alert('최소 1개 이상의 모듈을 선택해주세요.');
    return;
  }

  document.getElementById('overlay').classList.add('active');

  try {
    const {
      Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
      AlignmentType, BorderStyle, WidthType, ShadingType, VerticalAlign,
      HeightRule
    } = window.docx;

    const FONT = '맑은 고딕';
    const SIZE = 20;
    const HEADER_FILL = 'D9D9D9';
    const HL_FILL = 'FFF2CC';

    const border = { style: BorderStyle.SINGLE, size: 4, color: '999999' };
    const borders = { top: border, bottom: border, left: border, right: border };

    const T = (text, opts = {}) => new TextRun({ text, font: FONT, size: SIZE, ...opts });
    const Tb = (text, opts = {}) => new TextRun({ text, font: FONT, size: SIZE, bold: true, ...opts });
    const Thl = (text, opts = {}) => new TextRun({ text, font: FONT, size: SIZE, highlight: 'yellow', ...opts });
    const P = (runsOrText, opts = {}) => {
      const runs = Array.isArray(runsOrText) ? runsOrText : [T(runsOrText)];
      return new Paragraph({ children: runs, spacing: { before: 40, after: 40, line: 300 }, ...opts });
    };
    const Indent = (text, level = 1) => new Paragraph({
      children: [T(text)],
      spacing: { before: 20, after: 20, line: 280 },
      indent: { left: 360 * level },
    });
    const Article = (num, title, tag) => {
      const kids = [new TextRun({ text: `제${num}조 `, font: FONT, size: 24, bold: true })];
      if (tag) kids.push(new TextRun({ text: `[${tag}] `, font: FONT, size: 22, bold: true, color: 'C00000' }));
      kids.push(new TextRun({ text: `(${title})`, font: FONT, size: 24, bold: true }));
      return new Paragraph({ children: kids, spacing: { before: 280, after: 140 } });
    };
    const Sub = (t) => new Paragraph({
      children: [Tb(t)],
      spacing: { before: 140, after: 80 }
    });

    const Cell = (content, { w, fill, header, align, hl, rowSpan, colSpan } = {}) => {
      const paras = (Array.isArray(content) ? content : [content]).map(c => {
        if (c instanceof Paragraph) return c;
        let runs;
        if (typeof c === 'string') {
